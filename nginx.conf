worker_processes 1;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    access_log off;
    error_log /dev/stderr warn;

    # Disable proxy buffering — payloads are tiny (~500B) and buffering only
    # adds latency.
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_buffers 4 4k;
    proxy_buffer_size 4k;

    upstream apis {
        server api1:8080 max_fails=1 fail_timeout=2s;
        server api2:8080 max_fails=1 fail_timeout=2s;
        keepalive 128;
        keepalive_requests 100000;
        keepalive_timeout 60s;
    }

    server {
        listen 9999 default_server backlog=2048;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 1s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;

        # POST /fraud-score is non-idempotent; explicitly opt in so nginx
        # retries on transient 5xx instead of surfacing them to the client.
        proxy_next_upstream error timeout http_502 http_503 non_idempotent;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 5s;

        location / {
            proxy_pass http://apis;
        }
    }
}
