# Resource limits per spec §2.1: total ≤ 1.0 CPU + 350 MB across all services.
#   lb   = 0.10 CPU, 30 MB
#   api1 = 0.45 CPU, 160 MB
#   api2 = 0.45 CPU, 160 MB
# Sum: 1.00 CPU, 350 MB.

services:
  api1:
    build:
      context: .
      dockerfile: Dockerfile
    image: rinha-fraud:dev
    hostname: api1
    restart: unless-stopped
    networks: [rinha-net]
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    image: rinha-fraud:dev
    # Reuse the image built by api1; api2 has no build context of its own
    # so a single `docker compose build` produces the shared image.
    depends_on:
      - api1
    hostname: api2
    restart: unless-stopped
    networks: [rinha-net]
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  lb:
    image: nginx:alpine
    hostname: lb
    restart: unless-stopped
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [rinha-net]
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"

networks:
  rinha-net:
    driver: bridge
