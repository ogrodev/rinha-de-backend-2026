# Resource budget per spec §2.1: total ≤ 1.0 CPU + 350 MB.
# Architecture: Rust LB (so-no-forevis) listens on TCP :9999 and forwards
# to APIs over Unix domain sockets. APIs serve via Bun.serve(unix:).
#   lb   = 0.20 CPU /  30 MB   (Rust + io_uring; round-robin byte pipe)
#   api1 = 0.40 CPU / 160 MB
#   api2 = 0.40 CPU / 160 MB
# Sum: 1.00 CPU, 350 MB.

services:
  api1:
    image: ghcr.io/ogrodev/rinha-fraud:1.0.5
    hostname: api1
    restart: unless-stopped
    environment:
      SOCK: /run/sock/api1.sock
    volumes:
      - sock:/run/sock
    networks: [rinha-net]
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    image: ghcr.io/ogrodev/rinha-fraud:1.0.5
    depends_on:
      - api1
    hostname: api2
    restart: unless-stopped
    environment:
      SOCK: /run/sock/api2.sock
    volumes:
      - sock:/run/sock
    networks: [rinha-net]
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  lb:
    image: jrblatt/so-no-forevis:v0.0.2
    hostname: lb
    restart: unless-stopped
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    environment:
      UPSTREAMS: /run/sock/api1.sock,/run/sock/api2.sock
      PORT: "9999"
      BUF_SIZE: "4096"
      WORKERS: "1"
    ports:
      - "9999:9999"
    volumes:
      - sock:/run/sock
    networks: [rinha-net]
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined

volumes:
  sock:

networks:
  rinha-net:
    driver: bridge
