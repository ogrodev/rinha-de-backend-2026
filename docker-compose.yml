# Resource budget: total ≤ 1.0 CPU + 350 MB.
# Empirically on the Mac Mini rig: lb=0.10 hits CPU starvation under 900 RPS,
# pushing p99 above 100ms. lb=0.15 unblocks nginx; total stays under cap.
#   lb   = 0.15 CPU /  30 MB
#   api1 = 0.40 CPU / 160 MB
#   api2 = 0.40 CPU / 160 MB
# Sum: 0.95 CPU, 350 MB.

services:
  api1:
    image: ghcr.io/ogrodev/rinha-fraud:1.0.0
    hostname: api1
    restart: unless-stopped
    networks: [rinha-net]
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  api2:
    image: ghcr.io/ogrodev/rinha-fraud:1.0.0
    depends_on:
      - api1
    hostname: api2
    restart: unless-stopped
    networks: [rinha-net]
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  lb:
    image: nginx:alpine
    hostname: lb
    restart: unless-stopped
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [rinha-net]
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "30MB"

networks:
  rinha-net:
    driver: bridge
